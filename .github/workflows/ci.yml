name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      # wasi builds against the sibling engine checkout: go.mod has
      # `replace github.com/wago-org/wago => ../wago`, so the two repos must sit
      # side by side. Lay them out as ./wasi and ./wago under the workspace.
      - name: Checkout wasi
        uses: actions/checkout@v4
        with:
          path: wasi
      - name: Checkout wago (sibling for the replace directive)
        uses: actions/checkout@v4
        with:
          repository: wago-org/wago
          path: wago

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: wasi/go.sum

      - name: Format
        working-directory: wasi
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"
            exit 1
          fi

      - name: Vet
        working-directory: wasi
        run: go vet ./...

      - name: Build
        working-directory: wasi
        run: go build ./...

      - name: Test (race + coverage)
        working-directory: wasi
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      # Upload to Codecov for the coverage badge. fail_ci_if_error stays false so a
      # not-yet-enabled Codecov repo (or a missing token) never turns CI red; enable
      # the repo at codecov.io to light the badge up.
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: wasi/coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
